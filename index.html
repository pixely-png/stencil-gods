<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stencil Gods</title>
</head>
<body>
    <script>
        // Example of using plain JavaScript instead of JSX
        document.addEventListener('DOMContentLoaded', function() {
            const app = document.createElement('div');
            app.innerHTML = '<h1>Welcome to Stencil Gods!</h1>';
            document.body.appendChild(app);
        });
    </script>
</body>
</html>
