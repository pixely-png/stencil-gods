<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stencil Gods V3</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; background:#050505; overflow-x:hidden; }

@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

@keyframes jitter {
0%{transform:translate(0,0);}
25%{transform:translate(-1px,1px);}
50%{transform:translate(1px,-1px);}
75%{transform:translate(-1px,-1px);}
100%{transform:translate(0,0);}
}

@keyframes float-random {
0%,100%{transform:translate(0,0);}
33%{transform:translate(-3px,2px);}
66%{transform:translate(2px,-2px);}
}

@keyframes flicker {
0%,100%{opacity:1;}
50%{opacity:.3;}
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── DATA ───────────────────────── */

const PALETTES = [
{ id:"cyber", primary:"#00f3ff", accent:"#ff00ff", glow:"#00f3ff55"},
{ id:"anarchy", primary:"#ff2a2a", accent:"#ffffff", glow:"#ff2a2a44"},
{ id:"toxic", primary:"#39FF14", accent:"#FFD700", glow:"#39FF1444"},
{ id:"monarch", primary:"#bc13fe", accent:"#FFD700", glow:"#bc13fe44"},
{ id:"rust", primary:"#b7410e", accent:"#4a4a4a", glow:"#b7410e33"}
];

const ARCHETYPES = [
{ id:"tv", name:"MEDIA FEED"},
{ id:"riot", name:"PEACE KEEPER"},
{ id:"gas", name:"LAST BREATH"},
{ id:"money", name:"INFLATION"},
{ id:"surveillance", name:"BIG BROTHER"}
];

const SOUNDS = {
siren:"https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3",
spray:"https://assets.mixkit.co/active_storage/sfx/2895/2895-preview.mp3",
cow:"https://assets.mixkit.co/active_storage/sfx/1111/1111-preview.mp3"
};

/* ─── COMPONENTS ───────────────────────── */

function Surveillance({ color }) {
return (
<g transform="translate(180,120)" style={{animation:"jitter .4s infinite"}}>
<circle cx="50" cy="50" r="45" fill="#0a0a0a" stroke={color} strokeWidth="2"/>
{[0,120,240].map((d,i)=>(
<g key={i} transform={`rotate(${d},50,50)`}>
<rect x="45" y="10" width="10" height="25" fill={color}/>
<circle cx="50" cy="15" r="3" fill="red" style={{animation:"flicker 1s infinite"}}/>
</g>
))}
<text x="50" y="55" fontSize="8" fill={color} textAnchor="middle">WATCHING</text>
</g>
);
}

function Art({ archetype, palette }) {
if(archetype.id==="surveillance"){
return <Surveillance color={palette.primary}/>
}

return (
<g style={{animation:"float-random 4s ease-in-out infinite"}}>
<circle cx="250" cy="250" r="100" fill={palette.primary} opacity="0.1"/>
<path d="M200 200 L300 300 M300 200 L200 300"
stroke={palette.accent} strokeWidth="15"/>

<text x="250" y="380"
fill={palette.primary}
fontSize="40"
textAnchor="middle"
style={{fontFamily:"Bebas Neue"}}>
{archetype.name}
</text>
</g>
);
}

/* ─── MAIN ───────────────────────── */

function App(){

const [palette,setPalette] = useState(PALETTES[0]);
const [arch,setArch] = useState(ARCHETYPES[0]);
const [audioOn,setAudioOn] = useState(false);
const idRef = useRef(Math.random().toString(16).slice(2,8).toUpperCase());

function play(type){
if(!audioOn) return;
const a = new Audio(SOUNDS[type]);
a.volume = 0.2;
a.play().catch(()=>{});
}

function generate(){
const p = PALETTES[Math.floor(Math.random()*PALETTES.length)];
const a = ARCHETYPES[Math.floor(Math.random()*ARCHETYPES.length)];

setPalette(p);
setArch(a);

const r = Math.random();
if(r>.7) play("siren");
else if(r>.3) play("spray");
else play("cow");
}

function unlockAudio(){
setAudioOn(true);
}

return (
<div style={{
minHeight:"100vh",
color:"#fff",
fontFamily:"Share Tech Mono",
padding:"20px",
textAlign:"center"
}}>

<h1 style={{
fontFamily:"Bebas Neue",
fontSize:"12vw",
letterSpacing:"4px",
color:palette.primary,
margin:0
}}>
STENCIL GODS <span style={{color:"#fff"}}>V3</span>
</h1>

<button onClick={unlockAudio}
style={{
marginTop:"10px",
padding:"10px 20px",
background: audioOn ? "#39FF14" : "#ff2a2a",
border:"none",
color:"#000"
}}>
{audioOn ? "AUDIO READY" : "ENABLE AUDIO"}
</button>

<div style={{
marginTop:"20px",
display:"flex",
justifyContent:"center"
}}>

<div style={{
width:"90vw",
height:"110vw",
maxWidth:"500px",
maxHeight:"600px",
border:`2px solid ${palette.primary}`,
boxShadow:`0 0 25px ${palette.glow}`,
background:"#0a0a0a"
}}>

<svg viewBox="0 0 500 600" width="100%" height="100%">
<defs>
<filter id="noise">
<feTurbulence baseFrequency="0.5"/>
<feDisplacementMap in="SourceGraphic" scale="3"/>
</filter>
</defs>

<rect width="500" height="600" fill="#0d0d0d"/>

<g filter="url(#noise)">
<Art archetype={arch} palette={palette}/>
</g>

<text x="20" y="40"
fill={palette.primary}
fontSize="12">
ID: {idRef.current}
</text>

</svg>
</div>
</div>

<button onClick={generate}
style={{
marginTop:"20px",
padding:"15px 30px",
background:"transparent",
border:`2px solid ${palette.primary}`,
color:palette.primary,
fontSize:"1.4rem",
fontFamily:"Bebas Neue",
width:"90%",
maxWidth:"400px"
}}>
⚡ SPRAY NEW TAG
</button>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
